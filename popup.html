<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Term Library</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 480px;
      background: #0f0f1a;
      color: #e0e0ff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid #1e1e3a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #7c6af7, #4ecdc4);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.3px;
      color: #fff;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #1e1e3a;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      color: #666;
      border: none;
      background: none;
      transition: color 0.2s;
    }

    .tab.active {
      color: #7c6af7;
      border-bottom: 2px solid #7c6af7;
    }

    .panel { display: none; padding: 16px; }
    .panel.active { display: block; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0ff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    input:focus, textarea:focus { border-color: #7c6af7; }

    button.primary {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #7c6af7, #5b4fd4);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button.primary:hover { opacity: 0.9; }

    .saved-msg {
      text-align: center;
      font-size: 12px;
      color: #4ecdc4;
      margin-top: 10px;
      min-height: 18px;
    }

    /* Library panel */
    .term-count {
      font-size: 12px;
      color: #555;
      margin-bottom: 12px;
    }

    .term-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }

    .term-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .term-card:hover { border-color: #7c6af7; }

    .term-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      font-weight: 400;
      color: #fff;
      margin-bottom: 4px;
    }

    .term-card p {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .term-date {
      font-size: 10px;
      color: #444;
      margin-top: 6px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #444;
      font-size: 13px;
      line-height: 1.6;
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

    /* Detail view */
    #detail-panel { display: none; }
    #detail-panel.active { display: block; }

    .back-btn {
      background: none;
      border: none;
      color: #7c6af7;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 14px;
      font-family: 'DM Sans', sans-serif;
    }

    .detail-term {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: #fff;
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7c6af7;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    .detail-text {
      font-size: 13px;
      line-height: 1.6;
      color: #b0b0cc;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }

    .chip {
      background: #1e1e3a;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: #9090cc;
    }

    .study-item {
      background: #1a1a2e;
      border-left: 2px solid #7c6af7;
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 0 6px 6px 0;
    }

    .study-title { font-size: 12px; font-weight: 500; color: #ccc; margin-bottom: 3px; }
    .study-finding { font-size: 12px; color: #888; line-height: 1.4; }

    .detail-scroll { max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>

<header>
  <div class="logo">🔬</div>
  <h1>Term Library</h1>
</header>

<div class="tabs">
  <button class="tab active" data-tab="library">Library</button>
  <button class="tab" data-tab="settings">Settings</button>
</div>

<!-- Library Panel -->
<div class="panel active" id="library-panel">
  <div id="library-content"></div>
</div>

<!-- Detail Panel (overlays library) -->
<div id="detail-panel">
  <div style="padding: 16px;">
    <button class="back-btn" id="back-btn">← Back to Library</button>
    <div class="detail-scroll" id="detail-content"></div>
  </div>
</div>

<!-- Settings Panel -->
<div class="panel" id="settings-panel">
  <label>Your Field / Specialization</label>
  <textarea id="specialization" rows="3" placeholder="e.g. Ion channel biology specializing in neuroplasticity"></textarea>

  <label>Claude API Key</label>
  <input type="password" id="api-key" placeholder="sk-ant-..." />

  <button class="primary" id="save-settings">Save Settings</button>
  <div class="saved-msg" id="saved-msg"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
